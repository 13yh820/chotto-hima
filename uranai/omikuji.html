<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>おみくじ | ちょっとヒマ</title>
  <meta name="description" content="今日の運勢をおみくじで占おう！大吉・中吉・小吉・吉・末吉・凶が登場。願い事・恋愛・仕事・金運など詳細な運勢も確認できます。">
  <meta name="keywords" content="おみくじ,運勢,大吉,凶,占い,無料">
  <meta property="og:title" content="おみくじ | ちょっとヒマ">
  <meta property="og:url" content="https://13yh820.github.io/chotto-hima/uranai/omikuji.html">
  <link rel="canonical" href="https://13yh820.github.io/chotto-hima/uranai/omikuji.html">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    /* 筒とおみくじ */
    .shrine-area {
      text-align:center; padding:20px 0 10px;
    }
    .tube-wrap {
      display:inline-block; position:relative; cursor:pointer;
      margin-bottom:20px;
    }
    .tube {
      width:80px; height:140px; border-radius:40px 40px 12px 12px;
      background:linear-gradient(160deg,#8b1a1a,#5c0e0e);
      margin:0 auto; position:relative;
      box-shadow:4px 8px 24px rgba(0,0,0,.5), inset 2px 0 8px rgba(255,255,255,.12);
      transition:transform .15s;
    }
    .tube::after {
      content:''; position:absolute; top:8px; left:50%; transform:translateX(-50%);
      width:50px; height:120px; border-radius:25px 25px 8px 8px;
      background:linear-gradient(180deg,rgba(255,255,255,.18) 0%,transparent 60%);
    }
    .tube:active { transform:scale(.95) rotate(-3deg); }
    .tube-label {
      font-size:.8rem; font-weight:800; color:rgba(255,255,255,.6);
      margin-top:8px; letter-spacing:.1em;
    }

    /* おみくじ棒 */
    .stick {
      position:absolute; left:50%; transform:translateX(-50%);
      width:10px; border-radius:5px;
      background:linear-gradient(180deg,#f5e6c8,#d4a855);
      transition:all .6s cubic-bezier(.2,1.4,.4,1);
      z-index:2; bottom:20px; height:0;
    }
    .stick.out {
      height:110px; bottom:110px;
    }

    /* 振るアニメ */
    .tube-wrap.shaking .tube {
      animation:shake .5s ease;
    }
    @keyframes shake {
      0%,100%{transform:rotate(0deg)}
      15%{transform:rotate(-12deg)}
      30%{transform:rotate(12deg)}
      45%{transform:rotate(-10deg)}
      60%{transform:rotate(10deg)}
      75%{transform:rotate(-5deg)}
      90%{transform:rotate(5deg)}
    }

    .draw-hint {
      font-size:.9rem; color:var(--text-muted); margin-bottom:8px;
      animation:pulse 2s ease infinite;
    }
    @keyframes pulse { 0%,100%{opacity:.6} 50%{opacity:1} }

    /* 結果 */
    .result-wrap {
      display:none; animation:revealIn .6s ease;
    }
    @keyframes revealIn {
      from{opacity:0;transform:translateY(30px) scale(.95)}
      to{opacity:1;transform:translateY(0) scale(1)}
    }

    .omikuji-paper {
      background:linear-gradient(180deg,#fefce8,#fef9c3);
      border-radius:4px 4px 8px 8px;
      border:2px solid #d4a855;
      box-shadow:0 8px 32px rgba(0,0,0,.25), 2px 0 0 #d4a855;
      padding:28px 20px 32px;
      text-align:center;
      max-width:340px; margin:0 auto 20px;
      position:relative;
      color:#3d2800;
    }
    .omikuji-paper::before {
      content:''; position:absolute; top:0; left:50%; transform:translateX(-50%);
      width:4px; height:40px; background:#d4a855; border-radius:0 0 4px 4px;
    }

    .paper-title {
      font-size:.75rem; letter-spacing:.3em; color:#8b6914;
      font-weight:800; margin-bottom:8px; margin-top:12px;
    }
    .kekka-big {
      font-size:3.2rem; font-weight:900; letter-spacing:.1em;
      line-height:1; margin-bottom:8px;
      text-shadow:2px 2px 0 rgba(0,0,0,.1);
    }
    .kekka-yomi {
      font-size:.78rem; color:#8b6914; letter-spacing:.2em; margin-bottom:16px;
    }

    .divider { border:none; border-top:1px solid #d4a855; margin:12px 0; }

    .fortune-rows { text-align:left; }
    .fortune-row {
      display:flex; justify-content:space-between; align-items:center;
      padding:6px 0; border-bottom:1px solid rgba(212,168,85,.3); font-size:.82rem;
    }
    .fortune-row:last-child { border-bottom:none; }
    .fr-label { color:#6b4c11; font-weight:700; }
    .fr-val   { font-weight:800; color:#3d2800; }

    .omikuji-msg {
      font-size:.82rem; line-height:1.8; color:#4a3200;
      margin-top:14px; padding:12px; background:rgba(212,168,85,.12);
      border-radius:6px; border-left:3px solid #d4a855; text-align:left;
    }

    .result-grade-chip {
      display:inline-block; padding:6px 20px; border-radius:99px;
      font-size:.82rem; font-weight:800; margin-bottom:16px;
    }

    /* もう一度ボタン */
    .retry-area { text-align:center; margin-top:8px; }

    /* お神輿アイコン */
    .shrine-icon { font-size:3rem; margin-bottom:8px; display:block; }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7063985125158694" crossorigin="anonymous"></script>

<body>

  <div class="header-inner">
    <a class="logo" href="../index.html">ちょっと<span>ヒマ</span></a>
    <nav>
      <a href="../index.html#uranai">占い</a>
      <a href="../index.html#game">ゲーム</a>

  </div>
</header>
<main>
  <div class="page-header">
    <div class="icon">🎋</div>
    <h1>おみくじ</h1>
    <p>筒をタップして今日の運勢を占おう</p>
  </div>

  <div class="game-area" style="max-width:440px">
    <div class="ad-box">広告スペース</div>

    <!-- 引く前 -->
    <div id="drawArea">
      <div class="shrine-area">
        <span class="shrine-icon">⛩️</span>
        <p class="draw-hint">筒をタップして振ってください</p>
        <div class="tube-wrap" id="tubeWrap" onclick="drawOmikuji()">
          <div class="tube">
            <div class="stick" id="stick"></div>
          </div>
          <div class="tube-label">おみくじ</div>
        </div>
      </div>
    </div>

    <!-- 結果 -->
    <div class="result-wrap" id="resultWrap">
      <div class="omikuji-paper" id="omikujiPaper"></div>
      <div class="retry-area">
        <button class="btn btn-outline" onclick="reset()">もう一度引く 🎋</button>
      </div>
    </div>

    <div class="ad-box" style="margin-top:20px">広告スペース</div>
  </div>
</main>
<footer>
  <p>&copy; 2024 ちょっとヒマ &nbsp;|&nbsp; <a href="../privacy.html">プライバシーポリシー</a></p>
</footer>

function weightedRandom() {
  const total = OMIKUJI.reduce((s,o) => s+o.weight, 0);
  let r = Math.random() * total;
  for (const o of OMIKUJI) { r -= o.weight; if (r <= 0) return o; }
  return OMIKUJI[0];
}

let drawing = false;

function drawOmikuji() {
  if (drawing) return;
  drawing = true;

  // 振るアニメ
  const wrap = document.getElementById('tubeWrap');
  wrap.classList.add('shaking');

  setTimeout(() => {
    // 棒が出る
    document.getElementById('stick').classList.add('out');
  }, 300);

  setTimeout(() => {
    wrap.classList.remove('shaking');
    showResult();
  }, 1000);
}

function showResult() {
  const o = weightedRandom();

  const rowsHTML = o.rows.map(r =>
    `<div class="fortune-row"><span class="fr-label">${r.label}</span><span class="fr-val">${r.val}</span></div>`
  ).join('');

  document.getElementById('omikujiPaper').innerHTML = `
    <div class="paper-title">— 御 神 籤 —</div>
    <div class="kekka-big" style="color:${o.color}">${o.result}</div>
    <div class="kekka-yomi">（${o.yomi}）</div>
    <hr class="divider">
    <div style="font-size:.8rem;color:#6b4c11;font-weight:700;margin-bottom:10px">${o.overall}</div>
    <div class="fortune-rows">${rowsHTML}</div>
    <div class="omikuji-msg">${o.msg}</div>
  `;

  document.getElementById('drawArea').style.display = 'none';
  const rw = document.getElementById('resultWrap');
  rw.style.display = 'block';
  rw.scrollIntoView({ behavior:'smooth', block:'start' });
}

function reset() {
  drawing = false;
  document.getElementById('stick').classList.remove('out');
  document.getElementById('drawArea').style.display = 'block';
  document.getElementById('resultWrap').style.display = 'none';
  document.getElementById('omikujiPaper').innerHTML = '';
  window.scrollTo({ top:0, behavior:'smooth' });
}
</script>

</html>
