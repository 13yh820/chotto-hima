<head>

  <title>タロット占い 5枚引き | ちょっとヒマ</title>
  <meta name="description" content="無料の本格タロット占い。占いたいことを入力して大アルカナ5枚を選ぶと、過去・現在・課題・アドバイス・結果を詳しく解説します。">
  <meta name="keywords" content="タロット占い,無料,5枚引き,本格,大アルカナ,ケルト十字,恋愛,仕事,悩み">
  <meta property="og:title" content="タロット占い 5枚引き | ちょっとヒマ">
  <meta property="og:description" content="占いたいことを入力して5枚のカードを選ぼう。本格タロット占い無料。">

  <link rel="canonical" href="https://13yh820.github.io/chotto-hima/uranai/tarot.html">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    /* ステップ表示 */
    .step-indicator {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      margin-bottom: 28px;
    }
    .step-dot {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--border);
      color: var(--text-muted);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.82rem; font-weight: 700;
      transition: all 0.3s;
    }
    .step-dot.active { background: var(--primary); color: #fff; }
    .step-dot.done { background: #00c853; color: #fff; }
    .step-line { flex: 1; height: 2px; background: var(--border); max-width: 60px; }

    /* 質問入力 */
    .question-box {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      margin-bottom: 20px;
    }
    .question-box h2 { font-size: 1.1rem; margin-bottom: 12px; }
    .question-box p { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 16px; }
    .question-input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 1rem;
      font-family: inherit;
      color: var(--text);
      background: var(--bg);
      transition: border-color 0.2s;
      resize: none;
      box-sizing: border-box;
    }
    .question-input:focus { outline: none; border-color: var(--primary); }
    .quick-btns { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
    .quick-btn {
      padding: 6px 14px;
      border-radius: 99px;
      border: 1.5px solid var(--border);
      background: var(--card-bg);
      font-size: 0.78rem;
      cursor: pointer;
      font-family: inherit;
      color: var(--text);
      transition: all 0.18s;
    }
    .quick-btn:hover { border-color: var(--primary); color: var(--primary); }

    /* カード選択 */
    .pick-info {
      text-align: center;
      margin-bottom: 20px;
    }
    .pick-info .q-display {
      background: linear-gradient(135deg, var(--primary), #a78bfa);
      color: #fff;
      border-radius: var(--radius);
      padding: 14px 20px;
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .pick-count { color: var(--text-muted); font-size: 0.88rem; }
    .pick-count span { color: var(--primary); font-weight: 700; }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
      margin-bottom: 20px;
    }
    @media(max-width:600px){ .cards-grid { grid-template-columns: repeat(4, 1fr); gap: 6px; } }

    .pick-card {
      aspect-ratio: 2/3;
      border-radius: 8px;
      background: linear-gradient(135deg, #6c63ff, #a78bfa);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      transition: all 0.2s;
      position: relative;
      color: #fff;
    }
    .pick-card:hover { transform: translateY(-3px); box-shadow: 0 6px 16px rgba(108,99,255,0.35); }
    .pick-card.selected {
      background: linear-gradient(135deg, #00c853, #69f0ae);
      transform: translateY(-3px);
      box-shadow: 0 6px 16px rgba(0,200,83,0.35);
    }
    .pick-card.selected::after {
      content: attr(data-order);
      position: absolute;
      top: -8px; right: -8px;
      background: var(--accent);
      color: #fff;
      border-radius: 50%;
      width: 20px; height: 20px;
      font-size: 0.72rem;
      font-weight: 800;
      display: flex; align-items: center; justify-content: center;
    }

    /* 結果 */
    .result-header {
      background: linear-gradient(135deg, #2d2d3a, #1a1a2e);
      color: #fff;
      border-radius: var(--radius);
      padding: 24px;
      text-align: center;
      margin-bottom: 20px;
    }
    .result-header .q-text { font-size: 0.88rem; opacity: 0.75; margin-bottom: 8px; }
    .result-header h2 { font-size: 1.2rem; font-weight: 800; }

    .spread-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-bottom: 24px;
    }
    @media(max-width:500px){ .spread-grid { grid-template-columns: repeat(3, 1fr); } }

    .spread-card {
      background: linear-gradient(135deg, #fff9e6, #fff3cc);
      border: 2px solid #e8d88a;
      border-radius: 10px;
      padding: 10px 6px;
      text-align: center;
    }
    .spread-card .pos-label { font-size: 0.65rem; color: #b8a050; font-weight: 700; margin-bottom: 4px; }
    .spread-card .card-emoji { font-size: 1.6rem; }
    .spread-card .card-name { font-size: 0.7rem; font-weight: 800; color: #7a5f00; margin-top: 4px; }
    .spread-card .card-rev { font-size: 0.6rem; color: #c0392b; }
    .spread-card.reversed { background: linear-gradient(135deg, #fff0f0, #ffe0e0); border-color: #e8a0a0; }

    .card-details { display: flex; flex-direction: column; gap: 16px; }
    .card-detail-item {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }
    .card-detail-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .card-detail-emoji { font-size: 2rem; }
    .card-detail-pos { font-size: 0.72rem; font-weight: 700; color: var(--primary); background: var(--bg); padding: 3px 10px; border-radius: 99px; }
    .card-detail-name { font-size: 1rem; font-weight: 800; }
    .card-detail-rev { font-size: 0.72rem; color: #e53e3e; font-weight: 600; }
    .card-keywords { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .card-keyword { background: var(--bg); border-radius: 99px; padding: 3px 10px; font-size: 0.75rem; color: var(--primary); font-weight: 600; }
    .card-msg { font-size: 0.9rem; line-height: 1.85; color: var(--text); }

    .overall-msg {
      background: linear-gradient(135deg, var(--primary), #a78bfa);
      color: #fff;
      border-radius: var(--radius);
      padding: 24px;
      margin-top: 8px;
    }
    .overall-msg h3 { font-size: 1rem; margin-bottom: 10px; opacity: 0.85; }
    .overall-msg p { font-size: 0.95rem; line-height: 1.85; }
  </style>
</head>
<body>
<header>
  <div class="header-inner">
    <a class="logo" href="../index.html">ちょっと<span>ヒマ</span></a>
    <nav>
      <a href="horoscope.html">占い</a>
      <a href="../game/reflex.html">ゲーム</a>
    </nav>
  </div>
</header>
<main>
  <div class="page-header">
    <div class="icon">🃏</div>
    <h1>タロット占い</h1>
    <p>占いたいことを入力して、5枚のカードを選ぼう</p>
  </div>
  <div class="game-area" style="max-width:640px">
    <div class="ad-box">広告スペース</div>

    <!-- ステップインジケーター -->
    <div class="step-indicator">
      <div class="step-dot active" id="step1dot">1</div>
      <div class="step-line"></div>
      <div class="step-dot" id="step2dot">2</div>
      <div class="step-line"></div>
      <div class="step-dot" id="step3dot">3</div>
    </div>

    <!-- STEP 1: 質問入力 -->
    <div id="step1">
      <div class="question-box">
        <h2>🔮 何について占いますか？</h2>
        <p>心の中で質問を思い浮かべながら入力してください。より具体的な方が精度が上がります。</p>
        <textarea class="question-input" id="questionInput" rows="3" placeholder="例：彼との恋愛はうまくいきますか？　仕事の転職について知りたい　など"></textarea>
        <div class="quick-btns">
          <button class="quick-btn" onclick="setQuestion('恋愛について')">💕 恋愛</button>
          <button class="quick-btn" onclick="setQuestion('仕事・転職について')">💼 仕事</button>
          <button class="quick-btn" onclick="setQuestion('人間関係について')">🤝 人間関係</button>
          <button class="quick-btn" onclick="setQuestion('お金・金運について')">💰 金運</button>
          <button class="quick-btn" onclick="setQuestion('今後の運勢について')">🌟 全体運</button>
        </div>
      </div>
      <div style="text-align:center">
        <button class="btn btn-primary" onclick="goStep2()">カードを選ぶ →</button>
      </div>
    </div>

    <!-- STEP 2: カード選択 -->
    <div id="step2" style="display:none">
      <div class="pick-info">
        <div class="q-display" id="qDisplay"></div>
        <div class="pick-count">カードを <span id="pickCount">0</span> / 5 枚選んでください</div>
      </div>
      <div class="cards-grid" id="cardsGrid"></div>
      <div style="text-align:center">
        <button class="btn btn-primary" id="revealBtn" onclick="goStep3()" disabled style="opacity:0.5">結果を見る ✨</button>
      </div>
    </div>

    <!-- STEP 3: 結果 -->
    <div id="step3" style="display:none">
      <div class="result-header">
        <div class="q-text">占い内容</div>
        <h2 id="resultQ"></h2>
      </div>
      <div class="spread-grid" id="spreadGrid"></div>
      <div class="card-details" id="cardDetails"></div>
      <div class="overall-msg" id="overallMsg" style="margin-top:20px">
        <h3>🌙 総合メッセージ</h3>
        <p id="overallText"></p>
      </div>
      <br>
      <button class="btn btn-outline" style="width:100%" onclick="resetAll()">もう一度占う</button>
    </div>

    <div class="ad-box" style="margin-top:24px">広告スペース</div>
  </div>
</main>
<footer>
  <p>&copy; 2024 ちょっとヒマ &nbsp;|&nbsp; <a href="../privacy.html">プライバシーポリシー</a></p>
</footer>

  ]

let selectedCards = [];
let currentQuestion = '';
let shuffledDeck = [];

function setQuestion(q) {
  document.getElementById('questionInput').value = q;
}

function goStep2() {
  const q = document.getElementById('questionInput').value.trim();
  if (!q) { alert('占いたいことを入力してください！'); return; }
  currentQuestion = q;
  document.getElementById('qDisplay').textContent = '「' + q + '」';
  document.getElementById('step1dot').className = 'step-dot done';
  document.getElementById('step2dot').className = 'step-dot active';
  document.getElementById('step1').style.display = 'none';
  document.getElementById('step2').style.display = 'block';

  // カードをシャッフル
  shuffledDeck = CARDS.map((c, i) => ({ ...c, originalIdx: i, reversed: Math.random() < 0.35 }));
  for (let i = shuffledDeck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffledDeck[i], shuffledDeck[j]] = [shuffledDeck[j], shuffledDeck[i]];
  }
  selectedCards = [];

  const grid = document.getElementById('cardsGrid');
  grid.innerHTML = '';
  shuffledDeck.forEach((card, i) => {
    const btn = document.createElement('button');
    btn.className = 'pick-card';
    btn.innerHTML = '🌙';
    btn.dataset.idx = i;
    btn.onclick = () => pickCard(btn, i);
    grid.appendChild(btn);
  });
}

function pickCard(btn, idx) {
  if (btn.classList.contains('selected')) {
    btn.classList.remove('selected');
    selectedCards = selectedCards.filter(i => i !== idx);
  } else {
    if (selectedCards.length >= 5) return;
    selectedCards.push(idx);
    btn.classList.add('selected');
    btn.dataset.order = selectedCards.length;
    btn.innerHTML = CARDS.find(c => c.name === shuffledDeck[idx].name)?.emoji || '🃏';
  }
  document.getElementById('pickCount').textContent = selectedCards.length;
  const revealBtn = document.getElementById('revealBtn');
  if (selectedCards.length === 5) {
    revealBtn.disabled = false;
    revealBtn.style.opacity = '1';
  } else {
    revealBtn.disabled = true;
    revealBtn.style.opacity = '0.5';
  }
}

function goStep3() {
  document.getElementById('step2dot').className = 'step-dot done';
  document.getElementById('step3dot').className = 'step-dot active';
  document.getElementById('step2').style.display = 'none';
  document.getElementById('step3').style.display = 'block';

  document.getElementById('resultQ').textContent = '「' + currentQuestion + '」';

  const pickedCards = selectedCards.map(idx => shuffledDeck[idx]);

  // スプレッドグリッド
  const spreadGrid = document.getElementById('spreadGrid');
  spreadGrid.innerHTML = '';
  pickedCards.forEach((card, i) => {
    const pos = POSITIONS[i];
    const div = document.createElement('div');
    div.className = 'spread-card' + (card.reversed ? ' reversed' : '');
    div.innerHTML = `
      <div class="pos-label">${pos.icon} ${pos.label}</div>
      <div class="card-emoji" style="${card.reversed ? 'transform:rotate(180deg);display:inline-block' : ''}">${card.emoji}</div>
      <div class="card-name">${card.name}</div>
      ${card.reversed ? '<div class="card-rev">逆位置</div>' : ''}`;
    spreadGrid.appendChild(div);
  });

  // カード詳細
  const details = document.getElementById('cardDetails');
  details.innerHTML = '';
  let positiveCount = 0;
  pickedCards.forEach((card, i) => {
    const pos = POSITIONS[i];
    const data = card.reversed ? card.reversed_data || card : card;
    const isRev = card.reversed;
    const posData = isRev ? card.reversed : card.upright;
    const msg = posData.msgs[Math.floor(Math.random() * posData.msgs.length)];
    if (!isRev) positiveCount++;

    const div = document.createElement('div');
    div.className = 'card-detail-item';
    div.innerHTML = `
      <div class="card-detail-header">
        <div class="card-detail-emoji">${card.emoji}</div>
        <div>
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <span class="card-detail-name">${card.name}</span>
            ${isRev ? '<span class="card-detail-rev">逆位置</span>' : ''}
          </div>
          <div class="card-detail-pos">${pos.icon} ${pos.label}</div>
        </div>
      </div>
      <div class="card-keywords">${posData.keywords.map(k => `<span class="card-keyword">${k}</span>`).join('')}</div>
      <p class="card-msg">${msg}</p>`;
    details.appendChild(div);
  });

  // 総合メッセージ
  const ratio = positiveCount / 5;
  const msgs = ratio >= 0.6 ? OVERALL_MSGS.positive : ratio >= 0.4 ? OVERALL_MSGS.neutral : OVERALL_MSGS.negative;
  document.getElementById('overallText').textContent = msgs[Math.floor(Math.random() * msgs.length)];

  document.getElementById('step3').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function resetAll() {
  selectedCards = [];
  currentQuestion = '';
  document.getElementById('questionInput').value = '';
  document.getElementById('step1dot').className = 'step-dot active';
  document.getElementById('step2dot').className = 'step-dot';
  document.getElementById('step3dot').className = 'step-dot';
  document.getElementById('step3').style.display = 'none';
  document.getElementById('step2').style.display = 'none';
  document.getElementById('step1').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
