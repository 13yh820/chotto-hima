let drawn = false;

function drawCard() {
  if (drawn) return;
  drawn = true;

  // ランダムにカードと正逆位置を選ぶ
  const card = CARDS[Math.floor(Math.random() * CARDS.length)];
  const isReversed = Math.random() < 0.4;
  const pos = isReversed ? card.reversed : card.upright;

  // カードをめくる
  document.getElementById('cardWrap').classList.add('flipped');
  document.getElementById('hint').textContent = '✨ カードが引かれました';

  // カードの表面を設定
  document.getElementById('cNum').textContent = card.num;
  document.getElementById('cIcon').textContent = card.icon;
  document.getElementById('cName').textContent = card.name;
  document.getElementById('cRev').textContent = isReversed ? '逆位置' : '';
  if (isReversed) {
    document.getElementById('cardFace').style.transform = 'rotateY(180deg) rotate(180deg)';
  }

  // 結果を設定
  setTimeout(() => {
    const label = document.getElementById('rLabel');
    document.getElementById('rTitle').textContent = `${card.icon} ${card.name}（${isReversed ? '逆位置' : '正位置'}）`;
    label.textContent = isReversed ? '逆位置' : '正位置';
    label.className = 'pos-label ' + (isReversed ? 'reversed' : 'upright');

    const kRow = document.getElementById('rKeywords');
    kRow.innerHTML = pos.keywords.map(k => `<span class="keyword">${k}</span>`).join('');

    document.getElementById('rMessage').textContent = pos.msg;

    const result = document.getElementById('result');
    result.classList.add('show');
    result.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 700);
}

function resetDeck() {
  drawn = false;
  document.getElementById('cardWrap').classList.remove('flipped');
  document.getElementById('cardFace').style.transform = 'rotateY(180deg)';
  document.getElementById('result').classList.remove('show');
  document.getElementById('hint').textContent = '✨ カードをタップして1枚引く';
}
