<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>もぐらたたき | ちょっとヒマ</title>
  <meta name="description" content="飛び出したもぐらを素早くタップ！60秒で何点取れる？レアもぐらや爆弾も登場する中毒性抜群のもぐらたたき。">
  <meta name="keywords" content="もぐらたたき,ゲーム,無料,暇つぶし,タップ">
  <link rel="canonical" href="https://13yh820.github.io/chotto-hima/game/mole.html">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .mole-wrap { display:flex; flex-direction:column; align-items:center; padding:0 16px 24px; }

    .hud {
      display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin:10px 0 14px;
    }
    .hud-chip {
      background:var(--card-bg); border:1px solid var(--border); border-radius:99px;
      padding:6px 18px; font-size:.9rem; font-weight:700;
      display:flex; align-items:center; gap:6px;
    }
    .hud-chip .val { color:var(--primary); font-size:1.05rem; }

    .field {
      display:grid; grid-template-columns:repeat(3,1fr);
      gap:16px; max-width:360px; width:100%; margin-bottom:16px;
    }

    .hole-wrap {
      display:flex; flex-direction:column; align-items:center;
      position:relative; user-select:none; -webkit-tap-highlight-color:transparent;
    }

    /* 穴 */
    .hole {
      width:90px; height:46px; background:#4a2c0a;
      border-radius:50%; position:relative; z-index:2;
      box-shadow:inset 0 6px 18px rgba(0,0,0,.6), 0 4px 0 #2d1a06;
      overflow:hidden;
    }
    .hole::after {
      content:''; position:absolute; inset:0;
      background:radial-gradient(ellipse at 50% 40%, rgba(0,0,0,0) 30%, rgba(0,0,0,.5) 100%);
      border-radius:50%;
    }

    /* もぐら */
    .mole {
      width:72px; height:80px; position:absolute;
      bottom:-2px; left:50%; transform:translateX(-50%) translateY(100%);
      z-index:3; cursor:pointer; transition:transform .12s ease;
      display:flex; flex-direction:column; align-items:center; justify-content:flex-end;
    }
    .mole.up   { transform:translateX(-50%) translateY(22%); }
    .mole.hit  { transform:translateX(-50%) translateY(100%); }

    .mole-body { font-size:3.2rem; line-height:1; display:block; filter:drop-shadow(0 3px 6px rgba(0,0,0,.4)); }
    .mole-label {
      font-size:.62rem; font-weight:800; letter-spacing:.04em;
      background:#fff; border-radius:99px; padding:1px 7px;
      margin-bottom:2px; box-shadow:0 1px 4px rgba(0,0,0,.3);
    }
    .mole-label.rare   { background:#fbbf24; color:#92400e; }
    .mole-label.bomb   { background:#e53e3e; color:#fff; }
    .mole-label.normal { background:#8b5cf6; color:#fff; }

    /* 草 */
    .grass {
      width:100px; height:18px; background:linear-gradient(to bottom,#22c55e,#15803d);
      border-radius:50% 50% 0 0 / 60% 60% 0 0;
      position:relative; z-index:4; margin-top:-10px;
      box-shadow:0 -3px 0 rgba(0,0,0,.15);
    }

    /* スコアポップ */
    .score-pop {
      position:fixed; pointer-events:none; z-index:99;
      font-size:1.4rem; font-weight:900;
      animation:popUp .7s ease forwards;
      text-shadow:0 2px 8px rgba(0,0,0,.5);
    }
    @keyframes popUp {
      0%   { transform:translateY(0) scale(1);   opacity:1; }
      100% { transform:translateY(-60px) scale(1.3); opacity:0; }
    }

    /* ミスフラッシュ */
    .miss-flash { animation:flash .3s ease; }
    @keyframes flash { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* スタート/リザルト */
    .start-card {
      background:var(--card-bg); border-radius:var(--radius); border:1px solid var(--border);
      padding:30px 24px; text-align:center; max-width:360px; width:100%;
      box-shadow:var(--shadow);
    }
    .start-icon { font-size:4rem; margin-bottom:8px; }
    .start-card p { color:var(--text-muted); font-size:.9rem; margin-bottom:20px; line-height:1.7; }

    .legend { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-bottom:20px; }
    .legend-item {
      background:var(--bg); border:1px solid var(--border); border-radius:10px;
      padding:8px 12px; font-size:.78rem; text-align:center;
    }
    .legend-item .li-icon { font-size:1.5rem; display:block; }
    .legend-item .li-pt { font-weight:800; color:var(--primary); }

    .result-grade { font-size:3.5rem; text-align:center; margin-bottom:4px; }
    .result-title { font-size:1.2rem; font-weight:800; text-align:center; margin-bottom:4px; }
    .result-sub   { font-size:.85rem; color:var(--text-muted); text-align:center; margin-bottom:20px; }
    .result-grid  { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px; }
    .res-box { background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:14px; text-align:center; }
    .res-box .rb-val { font-size:1.5rem; font-weight:900; color:var(--primary); }
    .res-box .rb-label { font-size:.72rem; color:var(--text-muted); margin-top:2px; }

    .timer-bar-wrap { background:var(--border); border-radius:99px; height:8px; overflow:hidden; margin-bottom:4px; max-width:360px; width:100%; }
    .timer-bar { height:100%; border-radius:99px; background:linear-gradient(to right,#22c55e,#f59e0b,#e53e3e); transition:width 1s linear; }
  </style>
</head>
<body>
<header>
  <div class="header-inner">
    <a class="logo" href="../index.html">ちょっと<span>ヒマ</span></a>
    <nav><a href="../uranai/horoscope.html">占い</a><a href="reflex.html">ゲーム</a></nav>
  </div>
</header>
<main>
  <div class="page-header" style="padding-bottom:8px">
    <div class="icon">🐹</div>
    <h1>もぐらたたき</h1>
    <p>飛び出したもぐらを素早く叩こう！</p>
  </div>

  <div class="mole-wrap">
    <div class="ad-box">広告スペース</div>

    <!-- スタート画面 -->
    <div id="startArea">
      <div class="start-card">
        <div class="start-icon">🐹</div>
        <p>60秒で何点取れる？<br>種類によってポイントが違うよ！</p>
        <div class="legend">
          <div class="legend-item"><span class="li-icon">🐹</span><span class="li-pt">+10pt</span><br>ふつう</div>
          <div class="legend-item"><span class="li-icon">⭐</span><span class="li-pt">+30pt</span><br>レア</div>
          <div class="legend-item"><span class="li-icon">💣</span><span class="li-pt">-20pt</span><br>爆弾</div>
        </div>
        <button class="btn btn-primary" style="font-size:1.1rem;padding:14px 40px" onclick="startGame()">スタート 🐹</button>
      </div>
    </div>

    <!-- ゲーム中 -->
    <div id="gameArea" style="display:none">
      <div class="hud">
        <div class="hud-chip">🏆 <span class="val" id="scoreVal">0</span>pt</div>
        <div class="hud-chip">⏱ <span class="val" id="timeVal">60</span>秒</div>
        <div class="hud-chip">💥 コンボ <span class="val" id="comboVal">0</span></div>
      </div>
      <div class="timer-bar-wrap"><div class="timer-bar" id="timerBar"></div></div>

      <div class="field" id="field"></div>
    </div>

    <!-- 結果 -->
    <div id="resultArea" style="display:none">
      <div class="start-card">
        <div class="result-grade" id="resGrade"></div>
        <div class="result-title" id="resTitle"></div>
        <div class="result-sub"   id="resSub"></div>
        <div class="result-grid">
          <div class="res-box"><div class="rb-val" id="resScore">0</div><div class="rb-label">スコア</div></div>
          <div class="res-box"><div class="rb-val" id="resBest">0</div><div class="rb-label">ベスト</div></div>
          <div class="res-box"><div class="rb-val" id="resHit">0</div><div class="rb-label">ヒット数</div></div>
          <div class="res-box"><div class="rb-val" id="resCombo">0</div><div class="rb-label">最大コンボ</div></div>
        </div>
        <button class="btn btn-primary" onclick="startGame()">もう一度 🐹</button>
      </div>
    </div>

    <div class="ad-box" style="margin-top:16px">広告スペース</div>
  </div>
</main>
<footer>
  <p>&copy; 2024 ちょっとヒマ &nbsp;|&nbsp; <a href="../privacy.html">プライバシーポリシー</a></p>
</footer>
<script>
const HOLES = 9; // 3×3
let score, timeLeft, hits, combo, maxCombo, bestScore;
let moles = []; // 各穴の状態
let timerId, spawnId;
let moleTimers = [];

// もぐらの種類
const TYPES = {
  normal: { emoji:'🐹', label:'ふつう', pt:10,  labelClass:'normal', dur:() => 1200 - level*80 },
  rare:   { emoji:'⭐', label:'レア！', pt:30,  labelClass:'rare',   dur:() => Math.max(700 - level*50, 350) },
  bomb:   { emoji:'💣', label:'爆弾',   pt:-20, labelClass:'bomb',   dur:() => 1500 - level*60 },
};

let level = 1;

function getLevel(t) { return Math.floor((60 - t) / 12) + 1; }

// ===== フィールド構築 =====
function buildField() {
  const field = document.getElementById('field');
  field.innerHTML = '';
  moles = [];

  for (let i = 0; i < HOLES; i++) {
    const wrap = document.createElement('div');
    wrap.className = 'hole-wrap';

    const hole = document.createElement('div');
    hole.className = 'hole';

    const moleEl = document.createElement('div');
    moleEl.className = 'mole';
    moleEl.innerHTML = `<span class="mole-label normal" id="lbl${i}">ふつう</span><span class="mole-body" id="mb${i}">🐹</span>`;
    moleEl.addEventListener('pointerdown', (e) => { e.preventDefault(); whack(i); });

    const grass = document.createElement('div');
    grass.className = 'grass';

    hole.appendChild(moleEl);
    wrap.appendChild(hole);
    wrap.appendChild(grass);
    field.appendChild(wrap);

    moles.push({ el: moleEl, up: false, type: null, timer: null });
  }
}

// ===== スタート =====
function startGame() {
  score = 0; timeLeft = 60; hits = 0; combo = 0; maxCombo = 0; level = 1;
  bestScore = parseInt(localStorage.getItem('moleBest') || '0');

  document.getElementById('startArea').style.display = 'none';
  document.getElementById('resultArea').style.display = 'none';
  document.getElementById('gameArea').style.display = 'block';
  document.getElementById('scoreVal').textContent = 0;
  document.getElementById('timeVal').textContent = 60;
  document.getElementById('comboVal').textContent = 0;
  document.getElementById('timerBar').style.width = '100%';

  buildField();
  clearAllTimers();

  // タイマー
  timerId = setInterval(() => {
    timeLeft--;
    document.getElementById('timeVal').textContent = timeLeft;
    document.getElementById('timerBar').style.width = (timeLeft / 60 * 100) + '%';
    level = getLevel(timeLeft);
    if (timeLeft <= 0) { clearAllTimers(); endGame(); }
  }, 1000);

  // スポーン
  scheduleSpawn();
}

function scheduleSpawn() {
  const delay = Math.max(600 - level * 40, 250);
  spawnId = setTimeout(() => {
    if (timeLeft <= 0) return;
    spawnMole();
    scheduleSpawn();
  }, delay);
}

function spawnMole() {
  // 空いている穴を探す
  const empty = moles.map((m,i) => !m.up ? i : -1).filter(i => i >= 0);
  if (empty.length === 0) return;
  const idx = empty[Math.floor(Math.random() * empty.length)];

  // 種類を決定
  const r = Math.random();
  const type = r < 0.12 ? 'bomb' : r < 0.22 ? 'rare' : 'normal';
  const t = TYPES[type];

  const m = moles[idx];
  m.type = type;
  m.up = true;
  m.el.className = 'mole up';
  document.getElementById(`mb${idx}`).textContent = t.emoji;
  const lbl = document.getElementById(`lbl${idx}`);
  lbl.textContent = t.label;
  lbl.className = `mole-label ${t.labelClass}`;

  // 自動退場
  const dur = t.dur();
  m.timer = setTimeout(() => {
    if (m.up) { // 叩かれなかった
      if (type !== 'bomb') { // 爆弾は逃しても罰なし
        combo = 0;
        document.getElementById('comboVal').textContent = 0;
      }
      hideMole(idx);
    }
  }, dur);
}

function hideMole(idx) {
  const m = moles[idx];
  m.up = false;
  m.el.className = 'mole hit';
  clearTimeout(m.timer);
  setTimeout(() => { if (!m.up) m.el.className = 'mole'; }, 200);
}

// ===== たたく =====
function whack(idx) {
  const m = moles[idx];
  if (!m.up) return;
  const t = TYPES[m.type];

  // スコア
  const bonus = m.type === 'normal' && combo >= 5 ? Math.floor(combo * 2) : 0;
  const gained = t.pt + bonus;
  score = Math.max(0, score + gained);
  document.getElementById('scoreVal').textContent = score;

  if (m.type !== 'bomb') {
    hits++;
    combo++;
    if (combo > maxCombo) maxCombo = combo;
    document.getElementById('comboVal').textContent = combo;
  } else {
    combo = 0;
    document.getElementById('comboVal').textContent = 0;
  }

  // ポップアップ
  showPop(m.el, gained, m.type);
  hideMole(idx);
}

function showPop(el, pt, type) {
  const rect = el.getBoundingClientRect();
  const pop = document.createElement('div');
  pop.className = 'score-pop';
  pop.textContent = (pt >= 0 ? '+' : '') + pt;
  pop.style.left = rect.left + rect.width/2 - 20 + 'px';
  pop.style.top  = rect.top - 10 + 'px';
  pop.style.color = type === 'bomb' ? '#e53e3e' : type === 'rare' ? '#fbbf24' : '#a78bfa';
  document.body.appendChild(pop);
  setTimeout(() => pop.remove(), 750);
}

function clearAllTimers() {
  clearInterval(timerId);
  clearTimeout(spawnId);
  moles.forEach(m => clearTimeout(m.timer));
}

// ===== 終了 =====
function endGame() {
  // 全もぐら引っ込める
  moles.forEach((m,i) => { if(m.up) hideMole(i); });
  setTimeout(() => {
    document.getElementById('gameArea').style.display = 'none';
    document.getElementById('resultArea').style.display = 'block';

    if (score > bestScore) { bestScore = score; localStorage.setItem('moleBest', bestScore); }

    const grades = [
      { min:0,   g:'😅', t:'もっと練習！',     s:'まずは100点を目指そう！' },
      { min:100, g:'🙂', t:'なかなかやるね！', s:'コンボを繋ぐとスコアが伸びるよ！' },
      { min:250, g:'😊', t:'上手い！',          s:'レアもぐらも逃さず叩こう！' },
      { min:450, g:'🤩', t:'もぐら職人！',      s:'反応速度が抜群です！' },
      { min:650, g:'👑', t:'もぐらの天敵！',   s:'完璧な腕前です！！' },
    ];
    const gd = [...grades].reverse().find(g => score >= g.min) || grades[0];

    document.getElementById('resGrade').textContent = gd.g;
    document.getElementById('resTitle').textContent = gd.t;
    document.getElementById('resSub').textContent   = gd.s;
    document.getElementById('resScore').textContent  = score;
    document.getElementById('resBest').textContent   = bestScore;
    document.getElementById('resHit').textContent    = hits;
    document.getElementById('resCombo').textContent  = maxCombo;
  }, 400);
}
</script>
</body>
</html>
