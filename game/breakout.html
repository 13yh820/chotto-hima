<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ブロック崩し | ちょっとヒマ</title>
  <meta name="description" content="無料ブロック崩し！ボールでブロックを全部崩そう。スマホでもタップで操作できる。">
  <link rel="canonical" href="https://13yh820.github.io/chotto-hima/game/breakout.html">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .wrap{max-width:480px;margin:0 auto;padding:0 16px 32px;text-align:center}
    canvas{border-radius:12px;display:block;margin:0 auto;touch-action:none;cursor:none}
    .hud{display:flex;justify-content:space-between;align-items:center;padding:6px 4px;font-size:.9rem;font-weight:700;color:var(--text)}
    .hud span{color:var(--primary)}
    .over-msg{font-size:1.3rem;font-weight:900;margin:10px 0 4px}
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7063985125158694" crossorigin="anonymous"></script>
</head>
<body>
<header><div class="header-inner"><a class="logo" href="../index.html">ちょっと<span>ヒマ</span></a>
<nav><a href="../index.html#uranai">占い</a><a href="../index.html#game">ゲーム</a></nav></div></header>
<main>
<div class="page-header" style="padding-bottom:8px">
  <div class="icon">🧱</div><h1>ブロック崩し</h1><p>ボールを跳ね返してブロックを全部崩そう！</p>
</div>
<div class="wrap">
  <div class="hud">
    <div>スコア: <span id="scoreEl">0</span></div>
    <div>ベスト: <span id="bestEl">0</span></div>
    <div>ライフ: <span id="lifeEl">❤️❤️❤️</span></div>
  </div>
  <canvas id="c"></canvas>
  <div id="msg" style="margin-top:12px"></div>
  <button class="btn btn-primary" id="startBtn" style="margin-top:12px" onclick="startGame()">スタート ▶</button>
</div>
</main>
<footer><p>&copy; 2024 ちょっとヒマ &nbsp;|&nbsp; <a href="../privacy.html">プライバシーポリシー</a></p></footer>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');
const W=360,H=480;c.width=W;c.height=H;
const ROWS=5,COLS=8,BW=38,BH=16,BGAP=4;
const BOFFX=(W-(COLS*(BW+BGAP)-BGAP))/2;
let blocks,ball,paddle,lives,score,best,running,animId,level;
best=parseInt(localStorage.getItem('breakoutBest')||'0');
document.getElementById('bestEl').textContent=best;

const COLORS=['#7c3aed','#a855f7','#ec4899','#f59e0b','#10b981'];

function initLevel(){
  blocks=[];
  for(let r=0;r<ROWS;r++)for(let cl=0;cl<COLS;cl++)
    blocks.push({x:BOFFX+cl*(BW+BGAP),y:52+r*(BH+BGAP),alive:true,c:COLORS[r%COLORS.length]});
  const spd=1.5+level*0.3;
  ball={x:W/2,y:H-80,dx:spd*(Math.random()>.5?1:-1),dy:-spd,r:7};
  paddle={x:W/2-45,y:H-30,w:90,h:12};
}

function startGame(){
  document.getElementById('startBtn').style.display='none';
  document.getElementById('msg').innerHTML='';
  lives=3;score=0;level=0;running=true;
  document.getElementById('lifeEl').textContent='❤️'.repeat(lives);
  document.getElementById('scoreEl').textContent=0;
  initLevel();loop();
}

function loop(){
  if(!running)return;
  update();draw();
  animId=requestAnimationFrame(loop);
}

function update(){
  ball.x+=ball.dx;ball.y+=ball.dy;
  if(ball.x-ball.r<0){ball.x=ball.r;ball.dx*=-1;}
  if(ball.x+ball.r>W){ball.x=W-ball.r;ball.dx*=-1;}
  if(ball.y-ball.r<0){ball.y=ball.r;ball.dy*=-1;}
  if(ball.y+ball.r>=paddle.y&&ball.y+ball.r<=paddle.y+paddle.h
     &&ball.x>=paddle.x&&ball.x<=paddle.x+paddle.w){
    ball.dy=-Math.abs(ball.dy);
    let rel=(ball.x-(paddle.x+paddle.w/2))/(paddle.w/2);
    ball.dx=rel*3;
  }
  for(let b of blocks){
    if(!b.alive)continue;
    if(ball.x+ball.r>b.x&&ball.x-ball.r<b.x+BW&&ball.y+ball.r>b.y&&ball.y-ball.r<b.y+BH){
      b.alive=false;score+=10;
      document.getElementById('scoreEl').textContent=score;
      ball.dy*=-1;break;
    }
  }
  if(blocks.every(b=>!b.alive)){level++;initLevel();}
  if(ball.y-ball.r>H){
    lives--;document.getElementById('lifeEl').textContent='❤️'.repeat(lives)||'💀';
    if(lives<=0){endGame(false);}
    else{ball={x:W/2,y:H-80,dx:(1.5+level*0.3)*(Math.random()>.5?1:-1),dy:-(1.5+level*0.3),r:7};}
  }
}

function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#1e1b4b';ctx.fillRect(0,0,W,H);
  for(let b of blocks){
    if(!b.alive)continue;
    ctx.fillStyle=b.c;ctx.beginPath();ctx.roundRect(b.x,b.y,BW,BH,4);ctx.fill();
  }
  const grad=ctx.createLinearGradient(paddle.x,0,paddle.x+paddle.w,0);
  grad.addColorStop(0,'#7c3aed');grad.addColorStop(1,'#a855f7');
  ctx.fillStyle=grad;ctx.beginPath();ctx.roundRect(paddle.x,paddle.y,paddle.w,paddle.h,6);ctx.fill();
  ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);
  ctx.fillStyle='#fff';ctx.fill();
}

function endGame(win){
  running=false;cancelAnimationFrame(animId);
  if(score>best){best=score;localStorage.setItem('breakoutBest',best);document.getElementById('bestEl').textContent=best;}
  const msg=document.getElementById('msg');
  msg.innerHTML=`<div class="over-msg">${win?'🎉 クリア！':'💀 ゲームオーバー'}</div><div style="color:var(--text-muted);font-size:.9rem">スコア: ${score}</div>`;
  document.getElementById('startBtn').style.display='';
  document.getElementById('startBtn').textContent='もう一度 🧱';
}

c.addEventListener('mousemove',e=>{
  const r=c.getBoundingClientRect();
  paddle.x=Math.max(0,Math.min(W-paddle.w,(e.clientX-r.left)-paddle.w/2));
});
c.addEventListener('touchmove',e=>{
  e.preventDefault();
  const r=c.getBoundingClientRect();
  paddle.x=Math.max(0,Math.min(W-paddle.w,(e.touches[0].clientX-r.left)-paddle.w/2));
},{passive:false});

ctx.fillStyle='#1e1b4b';ctx.fillRect(0,0,W,H);
ctx.fillStyle='rgba(255,255,255,.15)';ctx.font='1rem sans-serif';ctx.textAlign='center';
ctx.fillText('スタートを押してください',W/2,H/2);
</script>
</body>
</html>
