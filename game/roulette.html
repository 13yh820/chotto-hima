<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ルーレット | ちょっとヒマ</title>
  <meta name="description" content="無料カジノルーレット！赤・黒・数字に賭けて回そう。スマホでも楽しめる。">
  <link rel="canonical" href="https://13yh820.github.io/chotto-hima/game/roulette.html">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .wrap{max-width:460px;margin:0 auto;padding:0 16px 32px}
    canvas{display:block;margin:0 auto;border-radius:50%;box-shadow:0 6px 32px rgba(0,0,0,.5)}
    .info-bar{background:rgba(0,0,0,.25);border-radius:10px;padding:10px 16px;
      display:flex;justify-content:space-between;color:#fff;margin:14px 0}
    .money{font-size:1.2rem;font-weight:900;color:#fbbf24}
    .bet-table{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:12px 0}
    .bet-cell{background:var(--card-bg);border:2px solid var(--border);border-radius:10px;
      padding:10px 6px;text-align:center;cursor:pointer;font-weight:700;transition:all .15s;font-size:.85rem}
    .bet-cell:hover,.bet-cell.sel{border-color:var(--primary);background:var(--primary);color:#fff}
    .bet-cell.red{color:#e53e3e}.bet-cell.black{color:#333}
    .chips{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:8px 0 14px}
    .chip{width:50px;height:50px;border-radius:50%;border:3px dashed rgba(255,255,255,.4);
      font-size:.78rem;font-weight:900;cursor:pointer;color:#fff;display:flex;align-items:center;justify-content:center}
    .result-num{text-align:center;font-size:3rem;font-weight:900;margin:10px 0 4px;min-height:56px}
    .outcome{text-align:center;font-size:1.1rem;font-weight:800;min-height:28px}
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7063985125158694" crossorigin="anonymous"></script>
</head>
<body>
<header><div class="header-inner"><a class="logo" href="../index.html">ちょっと<span>ヒマ</span></a>
<nav><a href="../index.html#uranai">占い</a><a href="../index.html#game">ゲーム</a></nav></div></header>
<main>
<div class="page-header" style="padding-bottom:8px">
  <div class="icon">🎡</div><h1>ルーレット</h1><p>赤・黒・番号に賭けて回そう！</p>
</div>
<div class="wrap">
  <div class="info-bar">
    <div><div style="font-size:.72rem;color:rgba(255,255,255,.5)">所持金</div><div class="money" id="money">1000</div></div>
    <div style="text-align:right"><div style="font-size:.72rem;color:rgba(255,255,255,.5)">ベット</div><div id="betShow" style="font-weight:700;color:#fff">0コイン</div></div>
  </div>

  <canvas id="c" width="240" height="240"></canvas>
  <div class="result-num" id="resultNum"></div>
  <div class="outcome" id="outcome"></div>

  <div style="margin-top:12px">
    <div style="font-size:.78rem;color:var(--text-muted);margin-bottom:6px;text-align:center">賭けを選ぶ（複数可）</div>
    <div class="bet-table" id="betTable">
      <div class="bet-cell" data-type="red" onclick="toggleBet(this)">🔴 赤 (×2)</div>
      <div class="bet-cell" data-type="black" onclick="toggleBet(this)">⚫ 黒 (×2)</div>
      <div class="bet-cell" data-type="even" onclick="toggleBet(this)">偶数 (×2)</div>
      <div class="bet-cell" data-type="odd" onclick="toggleBet(this)">奇数 (×2)</div>
      <div class="bet-cell" data-type="low" onclick="toggleBet(this)">1-18 (×2)</div>
      <div class="bet-cell" data-type="high" onclick="toggleBet(this)">19-36 (×2)</div>
    </div>
    <div style="font-size:.72rem;color:var(--text-muted);margin:4px 0 6px;text-align:center">特定番号に賭ける (×36)</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:center;max-height:100px;overflow-y:auto">
      <div class="bet-cell" style="width:38px;padding:8px 0" data-type="num0" onclick="toggleBet(this)">0</div>
      <script>for(let i=1;i<=36;i++){document.write(`<div class="bet-cell" style="width:38px;padding:8px 0" data-type="num${i}" onclick="toggleBet(this)">${i}</div>`)}</script>
    </div>
  </div>

  <div class="chips" style="margin-top:12px">
    <div class="chip" style="background:#e53e3e" onclick="addBet(10)">10</div>
    <div class="chip" style="background:#f59e0b" onclick="addBet(25)">25</div>
    <div class="chip" style="background:#22c55e" onclick="addBet(50)">50</div>
    <div class="chip" style="background:#3b82f6" onclick="addBet(100)">100</div>
  </div>

  <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
    <button class="btn btn-outline" onclick="clearAll()">クリア</button>
    <button class="btn btn-primary" id="spinBtn" onclick="spin()">スピン 🎡</button>
  </div>
</div>
</main>
<footer><p>&copy; 2024 ちょっとヒマ &nbsp;|&nbsp; <a href="../privacy.html">プライバシーポリシー</a></p></footer>
<script>
const RED=[1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];
let money=parseInt(localStorage.getItem('rouletteMoney')||'1000'),bet=0,bets=new Set(),spinning=false;
let angle=0,animId;

const c=document.getElementById('c'),ctx=c.getContext('2d');
const W=240,CX=120,CY=120,R=110;
const NUMS=[0,32,15,19,4,21,2,25,17,34,6,27,13,36,11,30,8,23,10,5,24,16,33,1,20,14,31,9,22,18,29,7,28,12,35,3,26];
const COLORS=NUMS.map(n=>n===0?'#22c55e':RED.includes(n)?'#e53e3e':'#1a1a2e');

function drawWheel(a){
  ctx.clearRect(0,0,W,W);
  const sliceAngle=2*Math.PI/NUMS.length;
  NUMS.forEach((n,i)=>{
    const start=a+i*sliceAngle,end=start+sliceAngle;
    ctx.beginPath();ctx.moveTo(CX,CY);ctx.arc(CX,CY,R,start,end);ctx.closePath();
    ctx.fillStyle=COLORS[i];ctx.fill();ctx.strokeStyle='rgba(255,255,255,.15)';ctx.lineWidth=1;ctx.stroke();
    ctx.save();ctx.translate(CX,CY);ctx.rotate(start+sliceAngle/2);
    ctx.textAlign='right';ctx.fillStyle='#fff';ctx.font='bold 10px sans-serif';
    ctx.fillText(n,R-6,4);ctx.restore();
  });
  ctx.beginPath();ctx.arc(CX,CY,18,0,Math.PI*2);
  ctx.fillStyle='#1e1b4b';ctx.fill();ctx.strokeStyle='#7c3aed';ctx.lineWidth=3;ctx.stroke();
  ctx.beginPath();ctx.moveTo(W-10,CY-8);ctx.lineTo(W,CY);ctx.lineTo(W-10,CY+8);
  ctx.fillStyle='#fbbf24';ctx.fill();
}

function addBet(n){if(spinning)return;if(bet+n>money)n=money-bet;bet+=n;updateUI();}
function toggleBet(el){if(spinning)return;el.classList.toggle('sel');const t=el.dataset.type;bets.has(t)?bets.delete(t):bets.add(t);}
function clearAll(){bet=0;bets.clear();document.querySelectorAll('.bet-cell.sel').forEach(e=>e.classList.remove('sel'));updateUI();}
function updateUI(){document.getElementById('money').textContent=money;document.getElementById('betShow').textContent=bet?bet+'コイン':'0コイン';}

function spin(){
  if(spinning)return;
  if(bet===0){bet=Math.min(10,money);}
  if(bets.size===0){document.getElementById('outcome').textContent='賭けを選んでください';return;}
  spinning=true;document.getElementById('spinBtn').disabled=true;
  document.getElementById('outcome').textContent='';document.getElementById('resultNum').textContent='';
  const finalAngle=angle+6*Math.PI+Math.random()*2*Math.PI;
  const duration=4000,start=performance.now();
  const startA=angle;
  (function loop(now){
    const t=Math.min((now-start)/duration,1);
    const ease=1-Math.pow(1-t,4);
    angle=startA+(finalAngle-startA)*ease;
    drawWheel(angle);
    if(t<1){animId=requestAnimationFrame(loop);}
    else{
      angle=finalAngle%(2*Math.PI);
      const sliceAngle=2*Math.PI/NUMS.length;
      const ptr=(2*Math.PI-((angle)%(2*Math.PI)))%(2*Math.PI);
      const idx=Math.floor(ptr/sliceAngle)%NUMS.length;
      const result=NUMS[idx];
      settle(result);
    }
  })(start);
}

function settle(num){
  document.getElementById('resultNum').textContent=num===0?'🟢 0':(RED.includes(num)?`🔴 ${num}`:`⚫ ${num}`);
  let gain=0;
  bets.forEach(type=>{
    if(type===`num${num}`){gain+=bet*36;}
    else if(type==='red'&&RED.includes(num)&&num!==0){gain+=bet*2;}
    else if(type==='black'&&!RED.includes(num)&&num!==0){gain+=bet*2;}
    else if(type==='even'&&num!==0&&num%2===0){gain+=bet*2;}
    else if(type==='odd'&&num%2===1){gain+=bet*2;}
    else if(type==='low'&&num>=1&&num<=18){gain+=bet*2;}
    else if(type==='high'&&num>=19&&num<=36){gain+=bet*2;}
  });
  gain-=bet;
  money=Math.max(0,money+gain);
  if(money<=0)money=1000;
  localStorage.setItem('rouletteMoney',money);
  const oc=document.getElementById('outcome');
  if(gain>0){oc.textContent=`🎉 +${gain}コイン！`;oc.style.color='#22c55e';}
  else if(gain===0){oc.textContent='🤝 元返し';oc.style.color='#f59e0b';}
  else{oc.textContent=`😢 -${Math.abs(gain+bet)>0?bet:0}コイン`;oc.style.color='#e53e3e';}
  bet=0;bets.clear();document.querySelectorAll('.bet-cell.sel').forEach(e=>e.classList.remove('sel'));
  updateUI();spinning=false;document.getElementById('spinBtn').disabled=false;
}

drawWheel(0);updateUI();
</script>
<script src="../js/game-guides.js"></script></body>
</html>
