    .wrap{max-width:400px;margin:0 auto;padding:0 16px 32px;text-align:center}
    .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;max-width:280px;margin:16px auto}
    .cell{aspect-ratio:1;border:2px solid var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;
      font-size:1.4rem;font-weight:900;color:#fff;transition:all .2s;text-transform:uppercase}
    .cell.has{border-color:var(--text-muted);color:var(--text)}
    .cell.correct{background:#22c55e;border-color:#22c55e;color:#fff}
    .cell.present{background:#f59e0b;border-color:#f59e0b;color:#fff}
    .cell.absent{background:#4b5563;border-color:#4b5563;color:#fff}
    .keyboard{display:flex;flex-direction:column;gap:6px;margin:14px 0}
    .kb-row{display:flex;gap:5px;justify-content:center}
    .kb-key{min-width:32px;height:44px;border-radius:6px;border:none;font-weight:700;font-size:.82rem;
      cursor:pointer;font-family:inherit;background:var(--card-bg);color:var(--text);
      padding:0 6px;-webkit-tap-highlight-color:transparent;transition:background .15s}
    .kb-key:active{opacity:.7}
    .kb-key.wide{min-width:52px;font-size:.72rem}
    .kb-key.correct{background:#22c55e;color:#fff}
    .kb-key.present{background:#f59e0b;color:#fff}
    .kb-key.absent{background:#4b5563;color:#666}
    .msg{font-size:1rem;font-weight:800;min-height:28px;margin:6px 0}
    .msg.win{color:#22c55e}.msg.lose{color:#e53e3e}

<main>
<div class="page-header" style="padding-bottom:8px">
  <div class="icon">🟩</div><h1>ワードル風</h1><p>5文字の英単語を6回以内に当てよう！</p>
</div>
<div class="wrap">
  <div style="font-size:.78rem;color:var(--text-muted);margin-bottom:4px">🟩正解 🟨位置違い ⬜含まない</div>

let answer,guesses,current,over,keyStates;

function newGame(){
  answer=WORDS[Math.floor(Math.random()*WORDS.length)].toUpperCase();
  guesses=[];current='';over=false;keyStates={};
  document.getElementById('msg').textContent='';document.getElementById('msg').className='msg';
  buildGrid();buildKeyboard();
}

function buildGrid(){
  const g=document.getElementById('grid');g.innerHTML='';
  for(let r=0;r<6;r++)for(let c=0;c<5;c++){
    const d=document.createElement('div');d.className='cell';d.id=`c${r}${c}`;g.appendChild(d);
  }
  updateGrid();
}

function updateGrid(){
  for(let r=0;r<6;r++){
    const word=guesses[r]||'';
    const isCurrent=r===guesses.length&&!over;
    const displayWord=isCurrent?current:word;
    const result=guesses[r]?evaluate(guesses[r]):'';
    for(let c=0;c<5;c++){
      const cell=document.getElementById(`c${r}${c}`);
      cell.textContent=displayWord[c]||'';
      cell.className='cell';
      if(displayWord[c]&&!result)cell.classList.add('has');
      if(result){
        if(result[c]==='correct')cell.classList.add('correct');
        else if(result[c]==='present')cell.classList.add('present');
        else cell.classList.add('absent');
      }
    }
  }
}

function evaluate(word){
  const res=Array(5).fill('absent');
  const ansArr=answer.split(''),used=Array(5).fill(false);
  for(let i=0;i<5;i++)if(word[i]===answer[i]){res[i]='correct';used[i]=true;}
  for(let i=0;i<5;i++){
    if(res[i]==='correct')continue;
    const j=ansArr.findIndex((a,k)=>!used[k]&&a===word[i]);
    if(j!==-1){res[i]='present';used[j]=true;}
  }
  return res;
}

function submit(){
  if(over||current.length<5)return;
  guesses.push(current);
  const res=evaluate(current);
  for(let i=0;i<5;i++){
    const k=current[i];
    const rank={correct:3,present:2,absent:1};
    if(!keyStates[k]||rank[res[i]]>rank[keyStates[k]])keyStates[k]=res[i];
  }
  updateKeyboard();
  current='';
  updateGrid();
  if(current===''){const last=guesses[guesses.length-1];
    if(evaluate(last).every(r=>r==='correct')){
      over=true;
      const msgs=['🎉 完璧！','✨ すごい！','👏 やるね！','😊 正解！','😅 ギリギリ！','😮 辛くも正解！'];
      document.getElementById('msg').textContent=msgs[guesses.length-1]||'正解！';
      document.getElementById('msg').className='msg win';
    } else if(guesses.length>=6){
      over=true;
      document.getElementById('msg').textContent=`答えは「${answer}」でした`;
      document.getElementById('msg').className='msg lose';
    }
  }
}

function pressKey(k){
  if(over)return;
  if(k==='ENTER'){submit();}
  else if(k==='DEL'){current=current.slice(0,-1);}
  else if(current.length<5&&/^[A-Z]$/.test(k)){current+=k;}
  updateGrid();
}

const KB=[['Q','W','E','R','T','Y','U','I','O','P'],['A','S','D','F','G','H','J','K','L'],['ENTER','Z','X','C','V','B','N','M','DEL']];
function buildKeyboard(){
  KB.forEach((row,ri)=>{
    const r=document.getElementById('kbr'+ri);r.innerHTML='';
    row.forEach(k=>{
      const b=document.createElement('button');b.className='kb-key'+(k.length>1?' wide':'');
      b.textContent=k==='DEL'?'⌫':k;b.id='kb_'+k;
      b.addEventListener('click',()=>pressKey(k));r.appendChild(b);
    });
  });
}
function updateKeyboard(){
  Object.entries(keyStates).forEach(([k,s])=>{
    const el=document.getElementById('kb_'+k);if(el){el.className='kb-key '+s;if(k.length>1)el.classList.add('wide');}
  });
}

document.addEventListener('keydown',e=>{
  if(e.ctrlKey||e.metaKey||e.altKey)return;
  if(e.key==='Enter')pressKey('ENTER');
  else if(e.key==='Backspace')pressKey('DEL');
  else if(/^[a-zA-Z]$/.test(e.key))pressKey(e.key.toUpperCase());
});

newGame();
</script>
