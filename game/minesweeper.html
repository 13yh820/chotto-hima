<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>地雷探し | ちょっとヒマ</title>
  <meta name="description" content="無料マインスイーパー！地雷を避けながら全マスを開けよう。スマホで長押しフラグ。">
  <link rel="canonical" href="https://13yh820.github.io/chotto-hima/game/minesweeper.html">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .wrap{max-width:480px;margin:0 auto;padding:0 8px 32px}
    .hud{display:flex;justify-content:space-between;align-items:center;padding:8px 4px 12px;font-size:.9rem;font-weight:700}
    .hud span{color:var(--primary)}
    .board{display:grid;gap:3px;margin:0 auto;width:fit-content;user-select:none}
    .cell{width:36px;height:36px;border-radius:6px;display:flex;align-items:center;justify-content:center;
      font-size:.95rem;font-weight:900;cursor:pointer;-webkit-tap-highlight-color:transparent;
      background:var(--card-bg);border:1px solid var(--border);transition:background .1s}
    .cell.open{background:var(--bg);cursor:default}
    .cell.mine{background:#e53e3e}
    .cell.flag{background:var(--card-bg)}
    .n1{color:#3b82f6}.n2{color:#22c55e}.n3{color:#ef4444}.n4{color:#7c3aed}
    .n5{color:#ec4899}.n6{color:#06b6d4}.n7{color:#111}.n8{color:#888}
    .diff-row{display:flex;gap:8px;justify-content:center;margin-bottom:12px;flex-wrap:wrap}
    .diff-btn{padding:7px 16px;border-radius:99px;border:2px solid var(--border);
      background:var(--card-bg);font-size:.82rem;font-weight:700;cursor:pointer;font-family:inherit;color:var(--text)}
    .diff-btn.active{border-color:var(--primary);background:var(--primary);color:#fff}
    .msg{text-align:center;font-size:1.15rem;font-weight:800;min-height:28px;margin:10px 0 6px}
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7063985125158694" crossorigin="anonymous"></script>
</head>
<body>
<header><div class="header-inner"><a class="logo" href="../index.html">ちょっと<span>ヒマ</span></a>
<nav><a href="../index.html#uranai">占い</a><a href="../index.html#game">ゲーム</a></nav></div></header>
<main>
<div class="page-header" style="padding-bottom:8px">
  <div class="icon">💣</div><h1>地雷探し</h1><p>地雷を避けて全マスを開けよう！長押しでフラグ</p>
</div>
<div class="wrap">
  <div class="diff-row">
    <button class="diff-btn active" onclick="setDiff(this,8,8,10)">かんたん<br><small>8×8 / 10個</small></button>
    <button class="diff-btn" onclick="setDiff(this,10,10,20)">ふつう<br><small>10×10 / 20個</small></button>
    <button class="diff-btn" onclick="setDiff(this,12,12,35)">むずかしい<br><small>12×12 / 35個</small></button>
  </div>
  <div class="hud">
    <div>💣 残り: <span id="mineLeft">10</span></div>
    <div>⏱ <span id="timerEl">0</span>秒</div>
    <div>🏆 ベスト: <span id="bestEl">—</span></div>
  </div>
  <div class="msg" id="msg"></div>
  <div class="board" id="board"></div>
  <div style="text-align:center;margin-top:14px">
    <button class="btn btn-primary" onclick="newGame()">リセット 🔄</button>
  </div>
</div>
</main>
<footer><p>&copy; 2024 ちょっとヒマ &nbsp;|&nbsp; <a href="../privacy.html">プライバシーポリシー</a></p></footer>
<script>
let ROWS=8,COLS=8,MINES=10;
let cells,flagCount,opened,started,timerInt,elapsed,over;
const NUMCOL=['','n1','n2','n3','n4','n5','n6','n7','n8'];

function setDiff(btn,r,c,m){
  document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  ROWS=r;COLS=c;MINES=m;newGame();
}

function newGame(){
  clearInterval(timerInt);elapsed=0;started=false;over=false;
  document.getElementById('timerEl').textContent='0';
  document.getElementById('msg').textContent='';
  flagCount=0;opened=0;
  document.getElementById('mineLeft').textContent=MINES;
  cells=[];
  for(let i=0;i<ROWS*COLS;i++)cells.push({mine:false,open:false,flag:false,adj:0});
  render();
}

function plant(skipIdx){
  let placed=0;
  while(placed<MINES){
    const i=Math.floor(Math.random()*ROWS*COLS);
    if(!cells[i].mine&&i!==skipIdx){cells[i].mine=true;placed++;}
  }
  for(let i=0;i<ROWS*COLS;i++){
    if(cells[i].mine)continue;
    cells[i].adj=neighbors(i).filter(n=>cells[n].mine).length;
  }
}

function neighbors(i){
  const r=Math.floor(i/COLS),c=i%COLS,nb=[];
  for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
    if(dr===0&&dc===0)continue;
    const nr=r+dr,nc=c+dc;
    if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS)nb.push(nr*COLS+nc);
  }
  return nb;
}

function open(i){
  if(over||cells[i].open||cells[i].flag)return;
  if(!started){plant(i);started=true;timerInt=setInterval(()=>{elapsed++;document.getElementById('timerEl').textContent=elapsed;},1000);}
  cells[i].open=true;opened++;
  if(cells[i].mine){boom(i);return;}
  if(cells[i].adj===0)neighbors(i).forEach(n=>open(n));
  if(opened===ROWS*COLS-MINES){win();}
  render();
}

function toggleFlag(i){
  if(over||cells[i].open)return;
  cells[i].flag=!cells[i].flag;
  flagCount+=cells[i].flag?1:-1;
  document.getElementById('mineLeft').textContent=MINES-flagCount;
  render();
}

function boom(idx){
  over=true;clearInterval(timerInt);
  cells.forEach(c=>{if(c.mine)c.open=true;});
  render();
  document.getElementById('msg').innerHTML='💥 地雷を踏んだ！';
}

function win(){
  over=true;clearInterval(timerInt);
  const key=`msB_${ROWS}_${COLS}`;
  const prev=parseInt(localStorage.getItem(key)||'9999');
  if(elapsed<prev){localStorage.setItem(key,elapsed);document.getElementById('bestEl').textContent=elapsed+'秒';}
  document.getElementById('msg').innerHTML=`🎉 クリア！ ${elapsed}秒`;
}

function render(){
  const bd=document.getElementById('board');
  bd.style.gridTemplateColumns=`repeat(${COLS},36px)`;
  bd.innerHTML='';
  cells.forEach((cell,i)=>{
    const d=document.createElement('div');
    d.className='cell';
    if(cell.open&&cell.mine){d.className='cell mine open';d.textContent='💣';}
    else if(cell.open){
      d.classList.add('open');
      if(cell.adj>0){d.textContent=cell.adj;d.classList.add(NUMCOL[cell.adj]);}
    } else if(cell.flag){d.className='cell flag';d.textContent='🚩';}
    let holdTimer;
    d.addEventListener('touchstart',e=>{e.preventDefault();holdTimer=setTimeout(()=>{toggleFlag(i);},400);},{passive:false});
    d.addEventListener('touchend',e=>{e.preventDefault();if(holdTimer){clearTimeout(holdTimer);open(i);}},{passive:false});
    d.addEventListener('click',()=>open(i));
    d.addEventListener('contextmenu',e=>{e.preventDefault();toggleFlag(i);});
    bd.appendChild(d);
  });
  const key=`msB_${ROWS}_${COLS}`;
  const b=localStorage.getItem(key);
  document.getElementById('bestEl').textContent=b?b+'秒':'—';
}

newGame();
</script>
<script src="../js/game-guides.js"></script></body>
</html>
