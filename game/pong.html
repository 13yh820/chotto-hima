<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ピンポン | ちょっとヒマ</title>
  <meta name="description" content="CPUとピンポン対決！スマホでは左右スワイプでパドル操作。先に5点取った方が勝ち。">
  <link rel="canonical" href="https://13yh820.github.io/chotto-hima/game/pong.html">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .wrap{max-width:420px;margin:0 auto;padding:0 16px 32px;text-align:center}
    canvas{border-radius:16px;display:block;margin:0 auto;touch-action:none}
    p{font-size:.82rem;color:var(--text-muted);margin-top:6px}
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7063985125158694" crossorigin="anonymous"></script>
</head>
<body>
<header><div class="header-inner"><a class="logo" href="../index.html">ちょっと<span>ヒマ</span></a>
<nav><a href="../index.html#uranai">占い</a><a href="../index.html#game">ゲーム</a></nav></div></header>
<main>
<div class="page-header" style="padding-bottom:8px">
  <div class="icon">🏓</div><h1>ピンポン</h1><p>CPUと対戦！先に5点で勝ち</p>
</div>
<div class="wrap">
  <canvas id="c" width="360" height="480"></canvas>
  <p>スマホ：画面上部をスワイプ / PC：マウスで操作</p>
</div>
</main>
<footer><p>&copy; 2024 ちょっとヒマ &nbsp;|&nbsp; <a href="../privacy.html">プライバシーポリシー</a></p></footer>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');
const W=360,H=480,PW=70,PH=10,WIN=5;
let ball,player,cpu,pScore,cScore,state,animId;

function init(){
  player={x:W/2-PW/2,y:H-24,w:PW,h:PH};
  cpu={x:W/2-PW/2,y:14,w:PW,h:PH};
  resetBall();pScore=0;cScore=0;state='idle';
}

function resetBall(){
  ball={x:W/2,y:H/2,r:8,dx:2.5*(Math.random()>.5?1:-1),dy:3*(Math.random()>.5?1:-1)};
}

function loop(){
  if(state==='play')update();
  draw();
  animId=requestAnimationFrame(loop);
}

function update(){
  ball.x+=ball.dx;ball.y+=ball.dy;
  if(ball.x-ball.r<0){ball.x=ball.r;ball.dx*=-1;}
  if(ball.x+ball.r>W){ball.x=W-ball.r;ball.dx*=-1;}
  if(ball.dy>0&&ball.y+ball.r>=player.y&&ball.y+ball.r<=player.y+PH&&ball.x>player.x&&ball.x<player.x+PW){
    ball.dy=-Math.abs(ball.dy);
    ball.dx+=(ball.x-(player.x+PW/2))/15;
    ball.dy=Math.max(Math.abs(ball.dy),.1)*-1;
  }
  if(ball.dy<0&&ball.y-ball.r<=cpu.y+PH&&ball.y-ball.r>=cpu.y&&ball.x>cpu.x&&ball.x<cpu.x+cpu.w){
    ball.dy=Math.abs(ball.dy);
  }
  const cpuTarget=ball.x-cpu.w/2;
  cpu.x+=(cpuTarget-cpu.x)*0.07;
  cpu.x=Math.max(0,Math.min(W-cpu.w,cpu.x));
  if(ball.y-ball.r>H){cScore++;checkWin()||resetBall();}
  if(ball.y+ball.r<0){pScore++;checkWin()||resetBall();}
}

function checkWin(){
  if(pScore>=WIN){state='win';return true;}
  if(cScore>=WIN){state='lose';return true;}
  return false;
}

function draw(){
  ctx.fillStyle='#0f172a';ctx.fillRect(0,0,W,H);
  ctx.setLineDash([10,10]);ctx.strokeStyle='rgba(255,255,255,.15)';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(0,H/2);ctx.lineTo(W,H/2);ctx.stroke();ctx.setLineDash([]);
  const pGrad=ctx.createLinearGradient(player.x,0,player.x+player.w,0);
  pGrad.addColorStop(0,'#7c3aed');pGrad.addColorStop(1,'#a855f7');
  ctx.fillStyle=pGrad;ctx.beginPath();ctx.roundRect(player.x,player.y,player.w,player.h,5);ctx.fill();
  ctx.fillStyle='rgba(255,150,150,.8)';ctx.beginPath();ctx.roundRect(cpu.x,cpu.y,cpu.w,cpu.h,5);ctx.fill();
  ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.7)';ctx.font='bold 24px sans-serif';ctx.textAlign='center';
  ctx.fillText(cScore,W/2,H/2-12);ctx.fillText(pScore,W/2,H/2+30);
  ctx.font='11px sans-serif';ctx.fillStyle='rgba(255,255,255,.4)';
  ctx.fillText('CPU',W/2-60,H/2-12);ctx.fillText('YOU',W/2-60,H/2+30);

  if(state==='idle'){
    ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#fff';ctx.font='bold 22px sans-serif';ctx.fillText('クリックでスタート',W/2,H/2);
  }
  if(state==='win'||state==='lose'){
    ctx.fillStyle='rgba(0,0,0,.55)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#fff';ctx.font='bold 26px sans-serif';
    ctx.fillText(state==='win'?'🎉 あなたの勝ち！':'😢 CPUの勝ち',W/2,H/2-14);
    ctx.font='16px sans-serif';ctx.fillStyle='rgba(255,255,255,.7)';ctx.fillText('クリックでリスタート',W/2,H/2+22);
  }
}

function handleClick(){if(state==='idle'||state==='win'||state==='lose'){init();state='play';}}
c.addEventListener('click',handleClick);
c.addEventListener('mousemove',e=>{
  const r=c.getBoundingClientRect();player.x=Math.max(0,Math.min(W-PW,(e.clientX-r.left)-PW/2));
});
c.addEventListener('touchmove',e=>{
  e.preventDefault();const r=c.getBoundingClientRect();
  player.x=Math.max(0,Math.min(W-PW,(e.touches[0].clientX-r.left)-PW/2));
},{passive:false});
c.addEventListener('touchstart',e=>{e.preventDefault();handleClick();},{passive:false});

init();loop();
</script>
<script src="../js/game-guides.js"></script></body>
</html>
