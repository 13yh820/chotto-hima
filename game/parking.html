<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>駐車テクニック | ちょっとヒマ</title>
  <meta name="description" content="駐車枠にぴったり止めよう！精度・タイム・接触回数で運転テクニックを評価。縦列駐車・車庫入れに挑戦！">
  <meta name="keywords" content="駐車,テクニック,ゲーム,無料,縦列駐車,車庫入れ">
  <link rel="canonical" href="https://13yh820.github.io/chotto-hima/game/parking.html">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .park-wrap { display:flex; flex-direction:column; align-items:center; padding:0 16px 20px; }
    #gameCanvas { display:block; border-radius:10px; touch-action:none;
      border:2px solid rgba(139,92,246,.3); box-shadow:0 0 24px rgba(139,92,246,.15),0 8px 24px rgba(0,0,0,.4); }
    .hud { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin:10px 0 8px; }
    .hud-chip { background:var(--card-bg); border:1px solid var(--border); border-radius:99px;
      padding:5px 14px; font-size:.82rem; font-weight:700; display:flex; align-items:center; gap:5px; }
    .hud-chip .val { color:var(--primary); font-size:.95rem; }
    .mode-btns { display:flex; gap:10px; justify-content:center; margin-bottom:12px; flex-wrap:wrap; }
    .mbtn { padding:9px 20px; border-radius:99px; border:2px solid var(--border);
      background:var(--card-bg); font-size:.85rem; font-weight:700; cursor:pointer;
      font-family:inherit; color:var(--text); transition:all .18s; }
    .mbtn.active, .mbtn:hover { border-color:var(--primary); background:var(--primary); color:#fff; }
    .touch-row { display:none; gap:10px; justify-content:center; padding:8px 0 2px; flex-wrap:wrap; }
    .tbtn { width:68px; height:56px; border-radius:12px; border:2px solid var(--border);
      background:var(--card-bg); font-size:1.5rem; display:flex; align-items:center; justify-content:center;
      cursor:pointer; user-select:none; -webkit-tap-highlight-color:transparent; color:var(--text); }
    .tbtn:active { background:var(--primary); border-color:var(--primary); color:#fff; }
    .ctrl-hint { font-size:.75rem; color:var(--text-muted); text-align:center; margin-top:4px; }
    @media(max-width:500px){ .touch-row{display:flex;} .ctrl-hint{display:none;} }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7063985125158694" crossorigin="anonymous"></script>
</head>
<body>
<header>
  <div class="header-inner">
    <a class="logo" href="../index.html">ちょっと<span>ヒマ</span></a>
    <nav><a href="../index.html#uranai">占い</a><a href="../index.html#game">ゲーム</a></nav>
  </div>
</header>
<main>
  <div class="page-header" style="padding-bottom:8px">
    <div class="icon">🅿️</div>
    <h1>駐車テクニック</h1>
    <p>駐車枠にぴったり止めよう！運転テクニックを評価</p>
  </div>
  <div class="park-wrap">
    <div class="mode-btns" id="modeBtns">
      <button class="mbtn active" data-mode="0" onclick="setMode(this)">🟢 かんたん<br><small>斜め駐車</small></button>
      <button class="mbtn" data-mode="1" onclick="setMode(this)">🟡 ふつう<br><small>車庫入れ</small></button>
      <button class="mbtn" data-mode="2" onclick="setMode(this)">🔴 むずかしい<br><small>縦列駐車</small></button>
    </div>
    <div class="hud">
      <div class="hud-chip">⏱ <span class="val" id="hudTime">0.0</span>秒</div>
      <div class="hud-chip">💥 接触 <span class="val" id="hudHit">0</span></div>
      <div class="hud-chip">🎯 精度 <span class="val" id="hudAcc">-</span></div>
    </div>
    <canvas id="gameCanvas"></canvas>
    <div class="touch-row">
      <button class="tbtn" id="tbL">◀</button>
      <button class="tbtn" id="tbUp">▲</button>
      <button class="tbtn" id="tbDown">▼</button>
      <button class="tbtn" id="tbR">▶</button>
    </div>
    <p class="ctrl-hint">↑ 前進 &nbsp;|&nbsp; ↓ バック &nbsp;|&nbsp; ← → ハンドル &nbsp;|&nbsp; タップしてスタート</p>
  </div>
</main>
<footer>
  <p>&copy; 2024 ちょっとヒマ &nbsp;|&nbsp; <a href="../privacy.html">プライバシーポリシー</a></p>
</footer>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = 420, H = 520;
canvas.width = W; canvas.height = H;
(function(){ const s=Math.min((window.innerWidth-32)/W,1); canvas.style.width=W*s+'px'; canvas.style.height=H*s+'px'; })();

// ===== 駐車モード定義 =====
// 各モード: car初期位置・角度、駐車スポット(x,y,w,h,angle)、障害車両
const MODES = [
  // 0: かんたん（斜め駐車）
  {
    carStart: {x:210, y:380, angle:-Math.PI/2},
    spot: {x:210, y:160, w:54, h:90, angle:0},
    walls: [
      {x:0,y:0,w:W,h:60},        // 上壁
      {x:0,y:460,w:W,h:H-460},   // 下壁
      {x:0,y:0,w:30,h:H},        // 左壁
      {x:W-30,y:0,w:30,h:H},     // 右壁
    ],
    obstacles: [
      {x:110,y:160,w:54,h:90,angle:0,color:'#e53e3e'},
      {x:310,y:160,w:54,h:90,angle:0,color:'#3b82f6'},
    ],
    label:'斜め駐車（かんたん）',
    hint:'スポットに前向きで入れよう'
  },
  // 1: ふつう（車庫入れ）
  {
    carStart: {x:100, y:380, angle:-Math.PI/2},
    spot: {x:320, y:200, w:60, h:100, angle:0},
    walls: [
      {x:0,y:0,w:W,h:50},
      {x:0,y:470,w:W,h:H-470},
      {x:0,y:0,w:20,h:H},
      {x:W-20,y:0,w:20,h:H},
      // 車庫の壁
      {x:260,y:100,w:12,h:200},
      {x:390,y:100,w:12,h:200},
      {x:260,y:100,w:142,h:12},
    ],
    obstacles: [
      {x:150,y:160,w:54,h:90,angle:0,color:'#e53e3e'},
      {x:150,y:300,w:54,h:90,angle:0,color:'#22c55e'},
    ],
    label:'車庫入れ（ふつう）',
    hint:'バックで車庫に入れよう'
  },
  // 2: むずかしい（縦列駐車）
  {
    carStart: {x:100, y:260, angle:0},
    spot: {x:300, y:320, w:64, h:110, angle:0},
    walls: [
      {x:0,y:0,w:W,h:40},
      {x:0,y:480,w:W,h:H-480},
      {x:0,y:0,w:20,h:H},
      {x:W-20,y:0,w:20,h:H},
    ],
    obstacles: [
      {x:300,y:180,w:64,h:110,angle:0,color:'#f59e0b'},
      {x:300,y:460,w:64,h:110,angle:0,color:'#06b6d4'},
      {x:120,y:180,w:54,h:90,angle:0,color:'#8b5cf6'},
    ],
    label:'縦列駐車（むずかしい）',
    hint:'バックで縦列駐車に入れよう'
  }
];

let mode = 0;
let state = 'idle'; // idle | playing | checking | result
let car, startTime, contacts, contactCooldown, elapsed;
let gameTimer = null;

function setMode(btn) {
  document.querySelectorAll('.mbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  mode = parseInt(btn.dataset.mode);
  state = 'idle';
}

// ===== 衝突判定（矩形×矩形、角度考慮なし） =====
function rectsOverlap(ax,ay,aw,ah, bx,by,bw,bh) {
  return ax < bx+bw && ax+aw > bx && ay < by+bh && ay+ah > by;
}

function getCarRect(c) {
  // 簡易AABB（角度無視）
  return { x:c.x-14, y:c.y-24, w:28, h:48 };
}

function checkCollision(c) {
  const m = MODES[mode];
  const r = getCarRect(c);
  for (const w of m.walls) {
    if (rectsOverlap(r.x,r.y,r.w,r.h, w.x,w.y,w.w,w.h)) return true;
  }
  for (const ob of m.obstacles) {
    if (rectsOverlap(r.x,r.y,r.w,r.h, ob.x-ob.w/2,ob.y-ob.h/2,ob.w,ob.h)) return true;
  }
  return false;
}

// ===== 駐車精度計算 =====
function calcAccuracy() {
  const m = MODES[mode];
  const sp = m.spot;
  const dx = Math.abs(car.x - sp.x);
  const dy = Math.abs(car.y - sp.y);
  // 角度差（ラジアン→0〜180度）
  let da = Math.abs(car.angle % Math.PI);
  if (da > Math.PI/2) da = Math.PI - da;
  const da_deg = da * 180 / Math.PI;

  const posPenalty = (dx / (sp.w/2) + dy / (sp.h/2)) * 30;
  const angPenalty = da_deg * 0.8;
  const acc = Math.max(0, Math.min(100, Math.round(100 - posPenalty - angPenalty)));
  return acc;
}

// 車がスポット内にいるか
function isInSpot() {
  const m = MODES[mode];
  const sp = m.spot;
  const r = getCarRect(car);
  // 車の中心がスポット内
  return car.x > sp.x - sp.w/2 + 8 && car.x < sp.x + sp.w/2 - 8 &&
         car.y > sp.y - sp.h/2 + 8 && car.y < sp.y + sp.h/2 - 8;
}

// ===== 入力 =====
const keys = {};
document.addEventListener('keydown', e => { keys[e.key]=true; if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault(); });
document.addEventListener('keyup',   e => { keys[e.key]=false; });
canvas.addEventListener('click', () => { if(state==='idle'||state==='result') startGame(); });
canvas.addEventListener('touchstart', e => { e.preventDefault(); if(state==='idle'||state==='result') startGame(); }, {passive:false});

const tKeys = {};
function tbBind(id,key){ const el=document.getElementById(id); el.addEventListener('touchstart',e=>{e.preventDefault();tKeys[key]=true;},{passive:false}); el.addEventListener('touchend',e=>{e.preventDefault();tKeys[key]=false;},{passive:false}); el.addEventListener('mousedown',()=>tKeys[key]=true); el.addEventListener('mouseup',()=>tKeys[key]=false); }
tbBind('tbL','ArrowLeft'); tbBind('tbR','ArrowRight');
tbBind('tbUp','ArrowUp'); tbBind('tbDown','ArrowDown');
function isKey(k){ return keys[k]||tKeys[k]; }

// ===== ゲーム開始 =====
function startGame() {
  const m = MODES[mode];
  car = { x:m.carStart.x, y:m.carStart.y, angle:m.carStart.angle, speed:0 };
  state = 'playing';
  contacts = 0; contactCooldown = 0;
  startTime = performance.now();
  elapsed = 0;
  document.getElementById('hudHit').textContent = '0';
  document.getElementById('hudTime').textContent = '0.0';
  document.getElementById('hudAcc').textContent = '-';
}

// ===== 更新 =====
let checkTimer = 0;
function update(now) {
  if (state !== 'playing') return;
  elapsed = (now - startTime) / 1000;
  document.getElementById('hudTime').textContent = elapsed.toFixed(1);

  const maxFwd = 3.2, maxBwd = 2.0, accel=0.10, brake=0.14, fric=0.88;
  const turnRate = 0.05;

  if (isKey('ArrowUp'))   car.speed = Math.min(car.speed + accel, maxFwd);
  if (isKey('ArrowDown')) car.speed = Math.max(car.speed - brake, -maxBwd);
  car.speed *= fric;

  if (Math.abs(car.speed) > 0.15) {
    const t = turnRate * Math.sign(car.speed);
    if (isKey('ArrowLeft'))  car.angle -= t;
    if (isKey('ArrowRight')) car.angle += t;
  }

  const nx = car.x + Math.cos(car.angle) * car.speed;
  const ny = car.y + Math.sin(car.angle) * car.speed;

  const prevCar = {...car};
  car.x = nx; car.y = ny;

  if (checkCollision(car)) {
    car.x = prevCar.x; car.y = prevCar.y;
    car.speed *= -0.3;
    if (contactCooldown <= 0) {
      contacts++;
      contactCooldown = 40;
      document.getElementById('hudHit').textContent = contacts;
    }
  }
  if (contactCooldown > 0) contactCooldown--;

  // スポット内かつ速度ほぼゼロ → 停車判定
  if (isInSpot() && Math.abs(car.speed) < 0.1) {
    checkTimer++;
    if (checkTimer > 60) { // 1秒停車で完了
      state = 'result';
      showResult();
    }
  } else {
    checkTimer = 0;
  }

  const acc = isInSpot() ? calcAccuracy() : '-';
  document.getElementById('hudAcc').textContent = isInSpot() ? acc+'%' : '-';
}

// ===== 描画 =====
function render() {
  const m = MODES[mode];

  // 背景（アスファルト）
  ctx.fillStyle = '#2a2a38';
  ctx.fillRect(0,0,W,H);

  // 駐車場ライン（全体）
  ctx.strokeStyle = 'rgba(255,255,255,.12)';
  ctx.lineWidth = 1;
  for (let x=60; x<W; x+=80) {
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke();
  }

  // 壁
  m.walls.forEach(w => {
    ctx.fillStyle = '#555';
    ctx.fillRect(w.x, w.y, w.w, w.h);
    ctx.strokeStyle = '#888';
    ctx.lineWidth = 1;
    ctx.strokeRect(w.x, w.y, w.w, w.h);
  });

  // 障害車両
  m.obstacles.forEach(ob => {
    ctx.save();
    ctx.translate(ob.x, ob.y);
    ctx.rotate(ob.angle + Math.PI/2);
    ctx.shadowColor = ob.color; ctx.shadowBlur = 8;
    ctx.fillStyle = ob.color;
    roundRectFill(ctx, -ob.w/2, -ob.h/2, ob.w, ob.h, 6);
    ctx.fillStyle='rgba(180,220,255,.5)'; ctx.shadowBlur=0;
    roundRectFill(ctx, -ob.w/2+3, -ob.h/2+4, ob.w-6, ob.h*0.28, 3);
    ctx.restore();
  });

  // 駐車スポット（ターゲット）
  const sp = m.spot;
  const inSpot = isInSpot();
  const acc = inSpot ? calcAccuracy() : 0;
  const spotColor = inSpot
    ? (acc >= 70 ? '#00e676' : acc >= 40 ? '#ffd740' : '#ff5252')
    : '#8b5cf6';

  ctx.save();
  ctx.translate(sp.x, sp.y);
  ctx.rotate(sp.angle);
  // 塗り
  ctx.fillStyle = inSpot ? `rgba(${spotColor.replace('#','').match(/../g).map(h=>parseInt(h,16)).join(',')},0.15)` : 'rgba(139,92,246,.1)';
  ctx.fillRect(-sp.w/2, -sp.h/2, sp.w, sp.h);
  // 枠線
  ctx.strokeStyle = spotColor;
  ctx.lineWidth = 3;
  ctx.strokeRect(-sp.w/2, -sp.h/2, sp.w, sp.h);
  // Pマーク
  ctx.fillStyle = spotColor; ctx.font = 'bold 22px sans-serif'; ctx.textAlign='center';
  ctx.fillText('🅿️', 0, 8);
  ctx.restore();

  // プレイヤーカー
  drawPlayerCar();

  // オーバーレイ
  if (state==='idle') {
    ctx.fillStyle='rgba(0,0,0,.72)'; ctx.fillRect(0,0,W,H);
    ctx.textAlign='center'; ctx.fillStyle='#fff';
    ctx.font='bold 30px sans-serif'; ctx.shadowColor='#8b5cf6'; ctx.shadowBlur=20;
    ctx.fillText('🅿️ 駐車テクニック',W/2,H/2-60);
    ctx.shadowBlur=0; ctx.fillStyle='rgba(255,255,255,.6)';
    ctx.font='15px sans-serif';
    ctx.fillText(`モード: ${m.label}`,W/2,H/2-20);
    ctx.fillText(m.hint,W/2,H/2+8);
    ctx.fillText('🅿️枠の中に止めよう',W/2,H/2+34);
    ctx.fillStyle='rgba(255,255,255,.5)';
    ctx.fillText('タップしてスタート',W/2,H/2+70);
  }

  // スポット内の精度ゲージ
  if (state==='playing' && inSpot) {
    ctx.save();
    ctx.fillStyle='rgba(0,0,0,.5)'; ctx.fillRect(W/2-80,H-40,160,24);
    const gc = ctx.createLinearGradient(W/2-78,0,W/2+78,0);
    gc.addColorStop(0,'#e53e3e'); gc.addColorStop(.5,'#fbbf24'); gc.addColorStop(1,'#22c55e');
    ctx.fillStyle=gc;
    ctx.fillRect(W/2-78, H-38, Math.round(acc/100*156), 20);
    ctx.strokeStyle='rgba(255,255,255,.3)'; ctx.lineWidth=1;
    ctx.strokeRect(W/2-80,H-40,160,24);
    ctx.fillStyle='#fff'; ctx.font='bold 13px sans-serif'; ctx.textAlign='center';
    ctx.fillText('精度 '+acc+'%', W/2, H-24);
    ctx.restore();
  }
}

function drawPlayerCar() {
  ctx.save();
  ctx.translate(car.x, car.y);
  ctx.rotate(car.angle + Math.PI/2);
  ctx.shadowColor='#a78bfa'; ctx.shadowBlur=14;
  const grad = ctx.createLinearGradient(-14,-24,14,24);
  grad.addColorStop(0,'#d0aaff'); grad.addColorStop(1,'#7c3aed');
  ctx.fillStyle=grad;
  roundRectFill(ctx,-14,-24,28,48,5);
  ctx.fillStyle='rgba(180,220,255,.7)'; ctx.shadowBlur=0;
  roundRectFill(ctx,-11,-20,22,13,3);
  ctx.fillStyle='#111';
  [[-1,-1],[1,-1],[-1,1],[1,1]].forEach(([sx,sy]) => ctx.fillRect(sx*14-sx*4, sy*24-sy*8, 5, 8));
  ctx.fillStyle='rgba(255,255,180,.9)'; ctx.shadowColor='#fffacd'; ctx.shadowBlur=8;
  [[-7,1],[7,1]].forEach(([ox]) => { ctx.beginPath(); ctx.arc(ox,-20,3,0,Math.PI*2); ctx.fill(); });
  ctx.restore();
}

function roundRectFill(c,x,y,w,h,r){
  c.beginPath(); c.moveTo(x+r,y); c.lineTo(x+w-r,y); c.arcTo(x+w,y,x+w,y+r,r);
  c.lineTo(x+w,y+h-r); c.arcTo(x+w,y+h,x+w-r,y+h,r);
  c.lineTo(x+r,y+h); c.arcTo(x,y+h,x,y+h-r,r);
  c.lineTo(x,y+r); c.arcTo(x,y,x+r,y,r); c.closePath(); c.fill();
}

function showResult() {
  const acc = calcAccuracy();
  const timeScore = Math.max(0, 100 - Math.round(elapsed * 1.5));
  const hitScore  = Math.max(0, 50 - contacts * 15);
  const total = Math.round(acc * 0.5 + timeScore * 0.3 + hitScore * 0.2);

  const grade = total>=90?'S':total>=75?'A':total>=55?'B':total>=35?'C':'D';
  const gColor = {S:'#fbbf24',A:'#22c55e',B:'#3b82f6',C:'#f97316',D:'#e53e3e'}[grade];
  const gMsg   = {S:'完璧な駐車！',A:'上手い！',B:'まあまあ！',C:'もう少し練習！',D:'練習あるのみ！'}[grade];

  setTimeout(()=>{
    ctx.fillStyle='rgba(0,0,0,.78)'; ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';
    ctx.fillStyle='#fff'; ctx.font='bold 24px sans-serif'; ctx.shadowBlur=0;
    ctx.fillText('🅿️ 駐車完了！',W/2,52);

    ctx.font='900 68px sans-serif'; ctx.fillStyle=gColor;
    ctx.shadowColor=gColor; ctx.shadowBlur=28;
    ctx.fillText(grade,W/2,134);
    ctx.shadowBlur=0;
    ctx.font='bold 15px sans-serif'; ctx.fillStyle=gColor;
    ctx.fillText(gMsg,W/2,160);

    const items=[
      ['🎯 駐車精度', acc+'%'],
      ['⏱ タイム',   elapsed.toFixed(1)+'秒'],
      ['💥 接触回数', contacts+'回'],
      ['🏆 総合スコア',total+' pt'],
    ];
    items.forEach(([label,val],i)=>{
      const y=200+i*44;
      ctx.fillStyle='rgba(255,255,255,.07)'; roundRectFill(ctx,W/2-150,y-18,300,34,8);
      ctx.fillStyle='rgba(255,255,255,.6)'; ctx.textAlign='left'; ctx.font='14px sans-serif';
      ctx.fillText(label,W/2-138,y+4);
      ctx.fillStyle=gColor; ctx.textAlign='right'; ctx.font='bold 15px sans-serif';
      ctx.fillText(val,W/2+138,y+4);
    });

    ctx.fillStyle='rgba(255,255,255,.45)'; ctx.textAlign='center'; ctx.font='15px sans-serif';
    ctx.fillText('タップして再挑戦',W/2,H-24);
  },300);
}

// ===== メインループ =====
function loop(now){
  requestAnimationFrame(loop);
  update(now);
  render();
}
requestAnimationFrame(loop);
</script>
<script src="../js/game-guides.js"></script></body>
